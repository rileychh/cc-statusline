name: Auto-update Nix package

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: DeterminateSystems/determinate-nix-action@32cb6a5ae30bb0dfc996fa7baf8bf1ed28442fa4 # v3.17.3
      - uses: DeterminateSystems/flakehub-cache-action@77fe95416299b8d1351b57bf10a1042a0ed75708 # v3.17.3

      - name: Update version in flake.nix
        run: |
          VERSION=$(git describe --tags --abbrev=0 2>/dev/null | sed 's/^v//')
          if [ -z "$VERSION" ]; then
            echo "No git tag found, skipping version update"
            exit 0
          fi
          sed -i "s/version = \"[0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*\"/version = \"$VERSION\"/" flake.nix
          echo "Updated version to $VERSION"

      - name: Regenerate govendor lockfile
        run: nix develop --command govendor

      - name: Verify build
        run: nix build

      - name: Open pull request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          commit-message: "chore: update Nix package"
          title: "chore: update Nix package"
          body: |
            Automated update triggered by a new tag.

            - Updated version in `flake.nix` from the latest git tag
            - Regenerated `govendor.toml` lockfile
            - Verified build with `nix build`
          base: main
          branch: nix-autoupdate
          delete-branch: true
